# ============================================================
# BrowserStack SDK Configuration
# FashionStack E2E Test Suite
# ============================================================

# --- Credentials ---
# Set BROWSERSTACK_USERNAME and BROWSERSTACK_ACCESS_KEY as environment variables
# or GitHub Actions secrets — never hardcode credentials here
userName: ${BROWSERSTACK_USERNAME}
accessKey: ${BROWSERSTACK_ACCESS_KEY}

# --- Project & Build Metadata ---
projectName: FashionStack Ecommerce
buildName: "FashionStack Full Suite - ${BUILD_ID:-local}"
buildTag: regression

# --- Test Framework ---
framework: mocha

# --- Parallelism ---
# Run 2 suites in parallel per platform for faster overall execution
parallelsPerPlatform: 2

# --- 5 Browser/Device Combinations ---
# 2 fixed (Desktop Chrome + Mobile Chrome for Percy) + 3 dynamic
platforms:
  # Fixed: Desktop Chrome (Percy baseline)
  - os: Windows
    osVersion: 11
    browserName: Chrome
    browserVersion: latest

  # Fixed: Mobile Chrome (Percy mobile baseline)
  - deviceName: Samsung Galaxy S23
    osVersion: 13.0
    browserName: Chrome

  # Dynamic combo 1
  - os: Windows
    osVersion: 10
    browserName: Firefox
    browserVersion: latest

  # Dynamic combo 2
  - os: OS X
    osVersion: Ventura
    browserName: Safari
    browserVersion: latest

  # Dynamic combo 3
  - deviceName: iPhone 14
    osVersion: 16
    browserName: Safari

# --- BrowserStack Features ---

# Test Observability & Reporting (TRA)
testObservability: true

# Percy Visual Testing
percy: true

# Accessibility Testing
accessibility: true
accessibilityOptions:
  wcagVersion: wcag21aa
  includeIssueType:
    bestPractice: true
    needsReview: true

# --- Detailed Logging ---
debug: true
networkLogs: true
consoleLogs: verbose
seleniumLogs: true
video: true

# --- Self-Healing ---
selfHeal: true

# --- Session Settings ---
idleTimeout: 300
maskCommands:
  - setValues
  - getValues
  - setCookies
  - getCookies

# --- Local Testing (disabled for public URL) ---
browserstackLocal: false