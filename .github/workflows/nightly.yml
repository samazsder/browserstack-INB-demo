# ============================================================
# GitHub Actions — FashionStack Nightly BrowserStack Run
# Triggers: Every night at 01:10 AM UTC + manual dispatch
# ============================================================

name: 🌙 Nightly BrowserStack Test Run

on:
  schedule:
    # Runs at 01:10 AM UTC every night
    - cron: '10 1 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - sanity
          - e2e
          - regression
          - flaky

env:
  BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
  BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
  BUILD_ID: ${{ github.run_number }}
  NODE_ENV: ci

jobs:
  # ─── Job 1: Smoke Tests (fast gate) ──────────────────────────────────────
  smoke:
    name: 🔥 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fashionstack-selenium-nodejs/package-lock.json

      - name: 📦 Install dependencies
        working-directory: fashionstack-selenium-nodejs
        run: npm ci

      - name: 🔥 Run Smoke Tests on BrowserStack
        working-directory: fashionstack-selenium-nodejs
        run: npm run test:browserstack:smoke
        env:
          BROWSERSTACK_BUILD_NAME: "Nightly-Smoke-#${{ github.run_number }}"

      - name: 📊 Upload smoke test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results-${{ github.run_number }}
          path: fashionstack-selenium-nodejs/reports/
          retention-days: 30

  # ─── Job 2: Full Suite (depends on smoke passing) ────────────────────────
  full-suite:
    name: 🚀 Full Test Suite
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 60
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == '' || github.event_name == 'schedule' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fashionstack-selenium-nodejs/package-lock.json

      - name: 📦 Install dependencies
        working-directory: fashionstack-selenium-nodejs
        run: npm ci

      - name: 🚀 Run Full Suite on BrowserStack
        working-directory: fashionstack-selenium-nodejs
        run: npm run test:browserstack
        env:
          BROWSERSTACK_BUILD_NAME: "Nightly-Full-#${{ github.run_number }}"

      - name: 📊 Upload full suite results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-results-${{ github.run_number }}
          path: fashionstack-selenium-nodejs/reports/
          retention-days: 30

  # ─── Job 3: E2E Only (manual trigger) ────────────────────────────────────
  e2e-only:
    name: 🎯 E2E Tests Only
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.inputs.suite == 'e2e' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fashionstack-selenium-nodejs/package-lock.json

      - name: 📦 Install dependencies
        working-directory: fashionstack-selenium-nodejs
        run: npm ci

      - name: 🎯 Run E2E Tests on BrowserStack
        working-directory: fashionstack-selenium-nodejs
        run: npm run test:browserstack:e2e
        env:
          BROWSERSTACK_BUILD_NAME: "E2E-Manual-#${{ github.run_number }}"

      - name: 📊 Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_number }}
          path: fashionstack-selenium-nodejs/reports/
          retention-days: 30

  # ─── Job 4: Notify on failure ─────────────────────────────────────────────
  notify:
    name: 📢 Notify on Failure
    runs-on: ubuntu-latest
    needs: [smoke, full-suite]
    if: failure()

    steps:
      - name: 🚨 Report failure
        run: |
          echo "::error::Nightly BrowserStack test run FAILED on build #${{ github.run_number }}"
          echo "::error::Check BrowserStack Automate dashboard for session details"
          echo "::error::Build: Nightly-Full-#${{ github.run_number }}"